version: "3.9"

services:

  api:
    build: .
    container_name: locadora_api

    ports:
      - "8001:8001"

    depends_on:
      - postgres

    env_file:
      - .env

  postgres:
    image: postgres:16

    container_name: postgres_locadora

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "@#Senhas321"
      POSTGRES_DB: locadora_veiculo

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: